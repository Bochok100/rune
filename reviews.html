<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отзывы</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 16px;
            background-color: var(--tg-theme-bg-color, #1a1a1a);
            color: var(--tg-theme-text-color, #ffffff);
            line-height: 1.6;
        }
        h1 {
            text-align: center;
            color: var(--tg-theme-button-color, #5288c1);
            font-size: 22px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        .subtitle {
            text-align: center;
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 25px;
        }
        .review-card {
            background-color: var(--tg-theme-secondary-bg-color, #242424);
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .review-img {
            width: 100%;
            border-radius: 10px;
            display: block;
        }
    </style>
</head>
<body>
    <h1>💬 Отзывы</h1>
    <p class="subtitle">Результаты людей, уже прошедших обряд и восполнивших свой ресурс.</p>

    <div class="review-card">
        <img src="review1.jpg" class="review-img" alt="Отзыв 1" onerror="this.parentElement.style.display='none'">
    </div>
    <div class="review-card">
        <img src="review2.jpg" class="review-img" alt="Отзыв 2" onerror="this.parentElement.style.display='none'">
    </div>
    <div class="review-card">
        <img src="review3.jpg" class="review-img" alt="Отзыв 3" onerror="this.parentElement.style.display='none'">
    </div>
    <div class="review-card">
        <img src="review4.jpg" class="review-img" alt="Отзыв 4" onerror="this.parentElement.style.display='none'">
    </div>
    <div class="review-card">
        <img src="review5.jpg" class="review-img" alt="Отзыв 5" onerror="this.parentElement.style.display='none'">
    </div>
    <div class="review-card">
        <img src="review6.jpg" class="review-img" alt="Отзыв 6" onerror="this.parentElement.style.display='none'">
    </div>
    <div class="review-card">
        <img src="review7.jpg" class="review-img" alt="Отзыв 7" onerror="this.parentElement.style.display='none'">
    </div>
    <div class="review-card">
        <img src="review8.jpg" class="review-img" alt="Отзыв 8" onerror="this.parentElement.style.display='none'">
    </div>
    <div class="review-card">
        <img src="review9.jpg" class="review-img" alt="Отзыв 9" onerror="this.parentElement.style.display='none'">
    </div>
    <div class="review-card">
        <img src="review10.jpg" class="review-img" alt="Отзыв 10" onerror="this.parentElement.style.display='none'">
    </div>
    <div class="review-card">
        <img src="review11.jpg" class="review-img" alt="Отзыв 11" onerror="this.parentElement.style.display='none'">
    </div>
    <div class="review-card">
        <img src="review12.jpg" class="review-img" alt="Отзыв 12" onerror="this.parentElement.style.display='none'">
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
    </script>
</body>
</html>
