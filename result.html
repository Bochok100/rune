<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Результаты обряда</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #1a1a1a);
            color: var(--tg-theme-text-color, #ffffff);
            padding: 20px;
            margin: 0;
        }
        h1 {
            text-align: center;
            color: var(--tg-theme-button-color, #5288c1);
            font-size: 22px;
            margin-bottom: 20px;
        }
        
        /* КРАСИВЫЙ ДИЗАЙН ГАРМОШКИ */
        .accordion-item {
            background-color: var(--tg-theme-secondary-bg-color, #242424);
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .accordion-header {
            padding: 16px;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            color: var(--tg-theme-button-color, #5288c1);
            transition: background-color 0.2s;
        }
        .accordion-header:active {
            background-color: rgba(255, 255, 255, 0.1);
        }
        /* Стрелочка */
        .arrow {
            transition: transform 0.3s ease;
            font-size: 12px;
        }
        .accordion-item.active .arrow {
            transform: rotate(180deg);
        }
        
        /* ПЛАВНОЕ РАСКРЫТИЕ */
        .accordion-content {
            max-height: 0;
            padding: 0 16px;
            opacity: 0;
            transition: all 0.4s ease-in-out;
            font-size: 15px;
            line-height: 1.5;
            color: var(--tg-theme-text-color, #e0e0e0);
        }
        .accordion-item.active .accordion-content {
            max-height: 2000px; /* С запасом для очень длинного текста */
            padding: 0 16px 16px 16px;
            opacity: 1;
        }
    </style>
</head>
<body>

    <h1>🔮 Твоя Триада Аминокислот</h1>
    
    <div id="results-container"></div>

    <script>
        // Инициализация Telegram WebApp (чтобы открывалось на весь экран)
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 📝 ВПИШИ СЮДА СВОИ ТЕКСТЫ!
        // Просто заменяй текст внутри кавычек для каждой аминокислоты. Можно использовать HTML теги, например <br> для переноса строки или <b>жирный</b>.
        const aminoDescriptions = {
            "Треонин": "Треонин — способствует поддержанию белкового обмена, важен для синтеза коллагена и эластина.<br><br>Здесь можно писать длинный текст, давать рекомендации и инсайты. Текст плавно выедет вниз.",
            "Аланин": "Аланин — важный источник энергии для мышц и нервной системы. Помогает регулировать уровень сахара в крови.",
            "Аргинин": "Текст про Аргинин...",
            "Аспарагин": "Текст про Аспарагин...",
            "Аспарагиновая к-та": "Текст про Аспарагиновую кислоту...",
            "Валин": "Текст про Валин...",
            "Глютамин": "Текст про Глютамин...",
            "Глютаминовая к-та": "Текст про Глютаминовую кислоту...",
            "Гистидин": "Текст про Гистидин...",
            "Глицин": "Текст про Глицин...",
            "Стоп-кодон": "Текст про Стоп-кодон...",
            "Изолейцин": "Текст про Изолейцин...",
            "Лейцин": "Текст про Лейцин...",
            "Лизин": "Текст про Лизин...",
            "Пирролизин": "Текст про Пирролизин...",
            "Метионин": "Текст про Метионин...",
            "Пролин": "Текст про Пролин...",
            "Серин": "Текст про Серин...",
            "Триптофан": "Текст про Триптофан...",
            "Тирозин": "Текст про Тирозин...",
            "Фенилаланин": "Текст про Фенилаланин...",
            "Цистеин": "Текст про Цистеин...",
            "Селеноцистеин": "Текст про Селеноцистеин..."
        };

        // Логика: Бот передает в ссылке ?aminos=Треонин,Аланин,Глицин
        function buildResults() {
            const urlParams = new URLSearchParams(window.location.search);
            const aminosParam = urlParams.get('aminos');
            const container = document.getElementById('results-container');

            if (!aminosParam) {
                container.innerHTML = "<p style='text-align:center;'>Ошибка: Аминокислоты не найдены.</p>";
                return;
            }

            const aminosList = aminosParam.split(',');

            // Для каждой аминокислоты, которую выдал бот, создаем карточку
            aminosList.forEach((amino, index) => {
                const desc = aminoDescriptions[amino] || "Описание скоро появится. Мы работаем над этим.";

                const itemDiv = document.createElement('div');
                itemDiv.className = 'accordion-item';

                itemDiv.innerHTML = `
                    <div class="accordion-header" onclick="toggleAccordion(this)">
                        <span>${index + 1}. ${amino}</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="accordion-content">
                        <p>${desc}</p>
                    </div>
                `;
                
                container.appendChild(itemDiv);
            });
        }

        // Функция плавной анимации гармошки
        function toggleAccordion(header) {
            const currentItem = header.parentElement;
            
            // Если нужно, чтобы при открытии одной закрывались остальные — раскомментируй код ниже:
            /*
            const allItems = document.querySelectorAll('.accordion-item');
            allItems.forEach(item => {
                if(item !== currentItem) item.classList.remove('active');
            });
            */
            
            currentItem.classList.toggle('active');
        }

        // Запускаем сборку страницы при открытии
        buildResults();
    </script>
</body>
</html>
