    <h1 style="text-align:center;">Значения аминокислот</h1>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        // ПОЛНАЯ БАЗА ВСЕХ ОПИСАНИЙ
        const descriptions = {
            "Аланин": `Аланин — важный источник энергии для мышечных тканей, головного мозга и центральной нервной системы. Укрепляет иммунную систему путем участия в обмене сахаров и органических кислот, а также помогает организму преобразовывать глюкозу в энергию.`,
            "Аргинин": `Аргинин — условно-незаменимая аминокислота. Играет важную роль в делении клеток, восстановлении после травм, выведении шлаков и поддержании иммунной функции. Улучшает кровообращение.`,
            "Аспарагин": `Аспарагин — аминокислота, необходимая для поддержания баланса в процессах, происходящих в центральной нервной системе. Участвует в синтезе аммиака и помогает организму справляться с усталостью.`,
            "Стоп-кодон": `Стоп-кодон — это сигнал остановки и фиксации. В контексте обряда означает завершение определенного этапа, закрепление результата или необходимую паузу для осмысления.`,
            "Аспарагиновая к-та": `Аспарагиновая кислота — играет важную роль в синтезе аммиака, повышает сопротивляемость усталости, участвует в преобразовании углеводов в мышечную энергию. За счет повышения продукции иммуноглобулинов и антител стимулирует иммунитет. Также аспарагиновая кислота необходима для поддержания баланса в процессах, происходящих в центральной нервной системе; препятствует как чрезмерному возбуждению, так и излишнему торможению.`,
            "Валин": `Валин - незаменимая аминокислота, оказывающая стимулирующее действие, одна из аминокислот ВСАА, поэтому может быть использована мышцами в качестве источника энергии. Валин необходим для метаболизма в мышцах, восстановления поврежденных тканей и для поддержания нормального обмена азота в организме. Валин часто используют для коррекции выраженных дефицитов аминокислот, в результате привыкания к лекарствам. Его чрезмерно высокий уровень в организме может привести к таким симптомам, как парестезии (ощущение мурашек на коже), вплоть до галлюцинаций. Прием валина в виде пищевых добавок следует сбалансировать приемом других разветвленных аминокислот ВСАА - L-лейцина и L-изолейцина.`,
            "Глютамин": `Глютамин - это аминокислота, наиболее часто встречающаяся в мышцах в свободном виде. Он очень легко проникает через гематоэнцефалический барьер и в клетках головного мозга переходит в глютаминовую кислоту и обратно, кроме того увеличивает количество гамма-аминомасляной кислоты, которая необходима для поддержания нормальной работы головного мозга. Эта аминокислота также поддерживает нормальное кислотно-щелочное равновесие в организме и здоровое состояние желудочно-кишечного тракта, необходим для синтеза ДНК и РНК.<br><br>Глютамин - активный участник азотного обмена. Его молекула содержит два атома азота и образуется из глютаминовой кислоты путем присоединения одного атома азота. Синтез глютамина помогает удалить избыток аммиака из тканей, прежде всего из головного мозга.<br>Глютамин находится в больших количествах в мышцах и используется для синтеза белков клеток скелетной мускулатуры. Применяется культуристами, при диетах, после операций и для профилактики потери мышечной массы.<br>L-глютамин уменьшает патологическую тягу к алкоголю.`,
            "Глютаминовая к-та": `Глютаминовая кислота является нейромедиатором, передающим импульсы в центральной нервной системе. Эта аминокислота играет важную роль в углеводном обмене и способствует проникновению кальция через гематоэнцефалический барьер. Может использоваться клетками головного мозга в качестве источника энергии. Она также обезвреживает аммиак, отнимая атомы азота в процессе образования другой аминокислоты - глютамина.<br>Применяют при коррекции расстройств поведения у детей, а также при лечении эпилепсии, мышечной дистрофии, язв, гипогликемических состояний, осложнений инсулинотерапии сахарного диабета и нарушений умственного развития.`,
            "Гистидин": `Гистидин - это незаменимая аминокислота, способствующая росту и восстановлению тканей, которая входит в состав миелиновых оболочек, защищающих нервные клетки, а также необходима для образования красных и белых клеток крови. Гистидин защищает организм от повреждающего действия радиации, способствует выведению тяжелых металлов из организма. Слишком высокое содержание гистидина может привести к возникновению стресса и психических нарушений.<br>Гистамин, очень важный компонент многих иммунологических реакций, синтезируется из гистидина. Он также способствует возникновению полового возбуждения. Так как гистамин стимулирует секрецию желудочного сока, применение гистидина помогает при нарушениях пищеварения.`,
            "Глицин": `Глицин замедляет дегенерацию мышечной ткани, так как является источником креатина. Глицин необходим для синтеза нуклеиновых кислот, желчных кислот и заменимых аминокислот в организме. Он входит в состав многих антацидных препаратов, полезен для восстановления поврежденных тканей, так как в больших количествах содержится в коже и соединительной ткани. Эта аминокислота необходима для нормального функционирования центральной нервной системы и поддержки хорошего состояния предстательной железы. Он выполняет функцию тормозного нейромедиатора. При необходимости глицин в организме может превращаться в серин.`,
            "Изолейцин": `Изолейцин - одна из аминокислот ВСАА и незаменимых аминокислот, необходимых для синтеза гемоглобина. Также стабилизирует и регулирует уровень сахара в крови и процессы энергообеспечения. Метаболизм изолейцина происходит в мышечной ткани. Совместный прием с валином и лейцином увеличивает выносливость и способствуют восстановлению мышечной ткани, что особенно важно для спортсменов. Дефицит этой аминокислоты приводит к возникновению симптомов, сходных с гипогликемией.`,
            "Лейцин": `Лейцин - незаменимая аминокисло
