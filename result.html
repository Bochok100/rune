<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расшифровка Обряда</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif; padding: 20px;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000); line-height: 1.5;
        }
        .card {
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 15px; border-radius: 12px; margin-bottom: 20px;
        }
        h2 { color: var(--tg-theme-button-color, #2481cc); font-size: 18px; margin-top: 0;}
    </style>
</head>
<body>
    <h1 style="text-align:center;">Значения аминокислот</h1>
    <div id="content">Загрузка...</div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        // СЮДА ДОБАВЬ ВСЕ СВОИ ТЕКСТЫ ИЗ СТАРОГО КОДА
        const descriptions = {
            "Серин": "Серин необходим для нормального обмена жиров и жирных кислот, роста мышечной ткани и поддержания нормального состояния иммунной системы...",
            "Лейцин": "Лейцин - незаменимая аминокислота, вместе с изолейцином и валином относящаяся к трем разветвленным аминокислотам ВСАА...",
            "Аланин": "Аланин — важный источник энергии для мышечных тканей, головного мозга и центральной нервной системы.",
            "Аргинин": "Аргинин — условно-незаменимая аминокислота. Играет важную роль в делении клеток, восстановлении после травм.",
            "Стоп-кодон": "Стоп-кодон — это сигнал остановки и фиксации."
        };

        const params = new URLSearchParams(window.location.search);
        const aminos = params.get('aminos') ? params.get('aminos').split(',') : [];

        let html = '';
        if(aminos.length > 0) {
            aminos.forEach((amino, index) => {
                let desc = descriptions[amino] || "Описание не найдено.";
                html += `<div class="card"><h2>${index + 1}. ${amino}</h2><p>${desc}</p></div>`;
            });
        } else {
            html = "<p>Данные не найдены.</p>";
        }
        document.getElementById('content').innerHTML = html;
    </script>
</body>
</html>
